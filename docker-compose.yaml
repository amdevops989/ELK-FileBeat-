version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disabling TLS/Auth saves CPU/RAM if purely local/internal
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # HARD LIMIT: Heap size locked to 512MB
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 1GB # Absolute physical RAM cap for the container
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    dependency_tracker:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512MB # Kibana can run comfortably capped here
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # To harvest docker logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 100MB # Tiny footprint
    restart: unless-stopped

volumes:
  es_data:
    driver: local