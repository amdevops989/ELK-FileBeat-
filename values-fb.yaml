# values-fb.yaml: Lightweight Filebeat configuration pointing to Logstash
daemonset:
  extraEnvs: []
  
filebeatConfig:
  filebeat.yml: |
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log
      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"

    # Send data to Logstash instead of Elasticsearch
    output.logstash:
      hosts: ["logstash-logstash-headless:5044"]
