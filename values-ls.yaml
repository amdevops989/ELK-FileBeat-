# values-ls.yaml: Cleaned up configuration to kill internal fallback monitoring
replicas: 1

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# --- FORCE DISABLE INTERNAL MONITORING FALLBACKS ---
logstashConfig:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

logstashPipeline:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
      http {
        port => 8080
        codec => json
      }
    }

    # --- NEW FILTER ENGINE ---
    filter {
      # Only try to parse if the log message looks like a standard K8s Go log
      if [message] =~ /^[IWEF]\d{4}/ {
        grok {
          match => { 
            "message" => "^%{WORD:log_level}%{NOTSPACE:k8s_timestamp}\s+%{NUMBER:thread_id}\s+%{NOTSPACE:source_file}:%{NUMBER:line_number}\]\s+%{GREEDYDATA:clean_message}" 
          }
        }
        
        # Map the single letter level to readable names
        if [log_level] == "I" { mutate { replace => { "log_level" => "INFO" } } }
        else if [log_level] == "W" { mutate { replace => { "log_level" => "WARN" } } }
        else if [log_level] == "E" { mutate { replace => { "log_level" => "ERROR" } } }
        else if [log_level] == "F" { mutate { replace => { "log_level" => "FATAL" } } }
      }
    }

    output {
      elasticsearch {
        hosts => ["https://elasticsearch-master:9200"]
        user => "elastic"
        password => "${ELASTIC_PASSWORD}"
        ssl => true
        ssl_certificate_verification => false
      }
    }

extraEnvs:
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-master-credentials
        key: password

# Add this block anywhere in your values-ls.yaml
service:
  type: ClusterIP
  ports:
    - name: beats
      port: 5044
      protocol: TCP
      targetPort: 5044
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
