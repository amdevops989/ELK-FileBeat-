# values-ls.yaml: Lightweight Logstash configuration for Minikube
replicas: 1

# Minimum resources for a local test environment
resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# Define a simple logstash pipeline
logstashPipeline:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
      http {
        port => 8080
        codec => json
      }
    }

    output {
      elasticsearch {
        hosts => ["https://elasticsearch-master:9200"]
        # Use the standard 'elastic' user or create a dedicated logstash user later
        user => "elastic"
        # Pass the password via an environment variable or hardcode it for testing
        password => "${ELASTIC_PASSWORD}"
        
        # Disable verification if you are using self-signed certs generated by the ES chart
        ssl => true
        ssl_certificate_verification => false
      }
    }

# Inject the Elasticsearch password into the environment from your existing secret
extraEnvs:
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-master-credentials
        key: password